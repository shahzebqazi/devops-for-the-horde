# CI runs on GitHub Actions (hosted macOS runners), not on your laptop unless you run `make check` locally.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: make check
        run: make check

  # Validates `flake.nix` inputs resolve and outputs evaluate (separate from Python `make check`).
  # Does not require a committed flake.lock; the lock is generated in CI for the check only.
  # For reproducible local/team builds, run `nix flake lock` once and commit `flake.lock`.
  nix-flake:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: nix flake lock + check
        run: |
          nix flake lock
          nix flake check
